# QM9 single-geometry: Qwen2.5-7B-Instruct + Fenske-Hall Z-matrix (Table 1)
# Produces the GeomQwen7B row. Identical to qm9_qwen14b_ori_fh.yml except for
# the base model.
#
# Trained on 4x A40 GPUs. With micro_batch_size=1 and
# gradient_accumulation_steps=1, the effective batch size is 4 (one per GPU).
# Adjust gradient_accumulation_steps to match if you train on fewer GPUs.
base_model: Qwen/Qwen2.5-7B-Instruct

load_in_8bit: true
load_in_4bit: false
strict: false

datasets:
  - path: data/qm9/ori_fh.jsonl
    ds_type: json
    type: alpaca
dataset_prepared_path: dataset_prepared
val_set_size: 0.0
output_dir: outputs

sequence_len: 2048
sample_packing: true
eval_sample_packing: true

adapter: lora
lora_model_dir:
lora_r: 32
lora_alpha: 16
lora_dropout: 0.05
lora_target_linear: true

wandb_project: YOUR_WANDB_PROJECT
wandb_entity: YOUR_WANDB_ENTITY
wandb_name: qw7b_ori_fh_b4

gradient_accumulation_steps: 1
micro_batch_size: 1
num_epochs: 4
optimizer: adamw_bnb_8bit
lr_scheduler: cosine
learning_rate: 0.0002

train_on_inputs: false
group_by_length: false
bf16: auto
fp16:
tf32: false

gradient_checkpointing: true
logging_steps: 1
flash_attention: true

warmup_steps: 10
evals_per_epoch: 4
eval_table_max_new_tokens: 128
saves_per_epoch: 1
weight_decay: 0.0
